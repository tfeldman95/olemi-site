<style>
  :root {
    --bg: #F5F3EE;
    --ink: #1A4D22;
    --paper: #FDFCF8;
    --hair: rgba(26,77,34,0.14);
    --display: "Instrument Serif", serif;
    --body: "Inter Tight", system-ui, sans-serif;
    --mono: "JetBrains Mono", monospace;
    --pad: clamp(24px, 4vw, 72px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--body); -webkit-font-smoothing: antialiased; }
  .display { font-family: var(--display); font-weight: 400; letter-spacing: -0.025em; }
  .mono { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
  input::placeholder { opacity: 0.45; color: var(--ink); }
  input:focus { outline: none; }
  /* Force email input left padding on mobile */
  .email-input-mobile { padding-left: 48px !important; }

  /* Mobile hero — hidden on desktop */
  .mobile-hero { display: none; }
  .desktop-hero { display: contents; }

  /* ── MOBILE ── */
  @media (max-width: 767px) {
    html { scroll-snap-type: none; }
    body { overflow-x: hidden; }
    .desktop-hero { display: none !important; }
    .mobile-hero {
      display: flex !important;
      flex-direction: column;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      padding: 20px 24px 28px 24px;
      background: var(--bg);
      color: var(--ink);
      justify-content: space-between;
    }
    /* Swap section order on mobile: product (3) before bacteria (2) */
    #root > div {
      display: flex !important;
      flex-direction: column !important;
    }
    .mobile-hero { order: 1 !important; }
    .desktop-hero { order: 1 !important; }
    #section-bacteria { order: 2 !important; }
    #section-product { order: 3 !important; }
    footer { order: 4 !important; }

    /* Section 2 (bacteria) */
    #root > div > div {
      padding: 64px 24px 28px 24px !important;
      min-height: auto !important;
    }
    /* Section 3 */
    section:last-of-type {
      height: auto !important;
      min-height: auto !important;
      grid-template-columns: 1fr !important;
      display: flex !important;
      flex-direction: column !important;
    }
    section:last-of-type > div:first-child {
      order: 1;
      padding: 28px 24px 20px 24px !important;
      border-left: none !important;
      max-height: none !important;
    }
    section:last-of-type > div:last-child {
      order: 2;
      padding: 0 48px 28px 48px !important;
      height: auto !important;
    }
    section:last-of-type h2 { display: block !important; font-size: clamp(32px, 9vw, 44px) !important; margin-bottom: 12px !important; }
    form > div:first-child { flex-direction: column !important; }
    form > div:first-child input { width: 100% !important; border-bottom: 1px solid var(--ink) !important; padding: 14px 0 !important; }
    form > div:first-child button { width: 100% !important; padding: 14px !important; background: var(--ink) !important; color: var(--bg) !important; text-align: center !important; margin-top: 4px !important; }
    form + div .mono, form ~ div .mono { white-space: nowrap !important; font-size: 10px !important; }
    #root > div > div .display { font-size: clamp(22px, 6vw, 36px) !important; }
    footer { padding: 16px 24px !important; }
  }

  /* Section transition fades */
  .fade-out-dark::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(to bottom, transparent, #1A4D22);
    pointer-events: none; z-index: 5;
  }
  .fade-out-light::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(to bottom, transparent, #F5F3EE);
    pointer-events: none; z-index: 5;
  }
  .fade-in-dark { position: relative; }
  .fade-in-dark::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(to top, transparent, #1A4D22);
    pointer-events: none; z-index: 5;
  }
</style>

<script type="text/babel">
window.__BRAND_NAME__ = "OLEMI";
window.TWEAKS = { brandName: "OLEMI", palette: "forestGreen" };

// Klaviyo email integration
var lastEmail = '';
var submitted = new Set();
function klaviyoSubscribe(email) {
  if (!email || submitted.has(email)) return;
  submitted.add(email);
  fetch('https://a.klaviyo.com/client/subscriptions/?company_id=XH57sJ', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'revision': '2023-12-15' },
    body: JSON.stringify({
      data: {
        type: 'subscription',
        attributes: { profile: { data: { type: 'profile', attributes: { email: email } } } },
        relationships: { list: { data: { type: 'list', id: 'Tg2wNM' } } }
      }
    })
  }).then(function(r) { console.log('Klaviyo status:', r.status); })
    .catch(function(e) { console.error('Klaviyo error:', e); });
}
setInterval(function() {
  document.querySelectorAll('input[type="email"]').forEach(function(input) {
    if (input.value && input.value.includes('@')) { lastEmail = input.value; }
    if (!input.dataset.hooked) {
      input.dataset.hooked = 'true';
      var container = input.closest('form') || input.parentElement;
      var btn = container ? container.querySelector('button') : null;
      if (btn) {
        btn.addEventListener('click', function() {
          var email = input.value.trim() || lastEmail;
          if (email && email.includes('@')) { klaviyoSubscribe(email); }
        }, true);
      }
    }
  });
}, 300);

        <p style={{
          fontFamily: "var(--body)", fontStyle: "normal",
          fontSize: "clamp(13px, 3.5vw, 16px)", lineHeight: 1.45,

            <div style={{ fontFamily: "var(--mono)", fontSize: 9, opacity: 0.5 }}>WE'LL BE IN TOUCH BEFORE LAUNCH.</div>
          </div>

            <div style={{ display: "flex", border: "1px solid var(--ink)", marginBottom: 8 }}>
              <input type="email" value={email} onChange={e => { setEmail(e.target.value); setError(""); }}
                placeholder="Enter your email"
                style={{
                  flex: 1, padding: "14px 18px 14px 0px", textIndent: "20px", background: "var(--paper)",
                  border: "none", fontFamily: "var(--body)", fontSize: 15,
                  color: "var(--ink)", outline: "none",
                }} />
            </div>
            <button type="submit" style={{
              width: "100%", padding: "17px",
              background: "var(--ink)", color: "#FFFFFF",
              border: "none", cursor: "pointer",
              fontFamily: "var(--mono)", fontSize: 12, letterSpacing: "0.16em",
              textTransform: "uppercase", textAlign: "center", fontWeight: 800,
            }}>Get early access →</button>
            {error && <div style={{ fontSize: 12, opacity: 0.6, marginTop: 6 }}>{error}</div>}
            <p style={{
              fontFamily: "var(--display)", fontStyle: "italic",
              fontSize: "clamp(19px, 5vw, 24px)", fontWeight: 700, lineHeight: 1.2,
              color: "var(--ink)", marginTop: 14, letterSpacing: "-0.01em",
            }}>First 500 members save 30% at launch.</p>
          </form>
        )}

        {/* Scroll indicator */}
        <div style={{
          display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
          marginTop: 18,
          opacity: showScroll ? 0.4 : 0,
          transition: "opacity 0.8s ease",
        }}>
          <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
            <path d="M1 1l6 6 6-6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <div style={{ fontFamily: "var(--mono)", fontSize: 8, letterSpacing: "0.2em", color: "var(--ink)" }}>SCROLL</div>
        </div>
      </div>
    </div>
  );
}
